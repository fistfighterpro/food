<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pro Metrics — Calorie & Macro Tracker</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/tabler-icons/2.47.0/iconfont/tabler-icons.min.css">
<style>
  :root {
    --color-background-primary: #ffffff;
    --color-background-secondary: #f8f9fa;
    --color-background-tertiary: #f1f3f5;
    --color-background-info: #e7f5ff;
    --color-background-danger: #fff5f5;
    --color-text-primary: #212529;
    --color-text-secondary: #495057;
    --color-text-tertiary: #adb5bd;
    --color-text-info: #1c7ed6;
    --color-text-danger: #fa5252;
    --color-border-tertiary: #e9ecef;
    --color-border-secondary: #ced4da;
    --color-border-info: #339af0;
    --border-radius-sm: 6px;
    --border-radius-md: 10px;
    --border-radius-lg: 16px;
    --font-sans: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    --box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
    
    --color-macro-carbs: #f59e0b;
    --color-macro-protein: #10b981;
    --color-macro-fat: #ef4444;
  }
  
  [data-theme="dark"] {
    --color-background-primary: #121214;
    --color-background-secondary: #1a1a1e;
    --color-background-tertiary: #26262b;
    --color-background-info: #0b2b4d;
    --color-background-danger: #421212;
    --color-text-primary: #f8f9fa;
    --color-text-secondary: #c1c2c5;
    --color-text-tertiary: #5c5f66;
    --color-text-info: #4dabf7;
    --color-text-danger: #ff8787;
    --color-border-tertiary: #2c2e33;
    --color-border-secondary: #373a40;
    --box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.25);
  }

  * { box-sizing: border-box; transition: background-color 0.2s, border-color 0.2s; }
  body {
    font-family: var(--font-sans);
    background: var(--color-background-tertiary);
    color: var(--color-text-primary);
    margin: 0;
    padding: 3rem 1rem;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
  }
  .container { max-width: 720px; margin: 0 auto; }
  
  header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 2rem;
  }
  
  h1 { font-size: 24px; font-weight: 700; margin: 0; letter-spacing: -0.5px; }
  
  .card {
    background: var(--color-background-primary);
    border: 1px solid var(--color-border-tertiary);
    border-radius: var(--border-radius-lg);
    padding: 1.5rem;
    margin-bottom: 1.5rem;
    box-shadow: var(--box-shadow);
  }
  
  input, select, textarea, button {
    font-family: var(--font-sans);
    font-size: 14px;
    border-radius: var(--border-radius-sm);
    border: 1px solid var(--color-border-secondary);
    background: var(--color-background-primary);
    color: var(--color-text-primary);
    padding: 10px 14px;
  }
  input[type="date"], input[type="text"], input[type="number"] { height: 42px; }
  input:focus, button:focus { outline: 2px solid var(--color-border-info); outline-offset: 1px; }
  
  button {
    cursor: pointer;
    background: var(--color-background-secondary);
    font-weight: 500;
    border: 1px solid var(--color-border-tertiary);
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
  }
  button:hover { background: var(--color-background-tertiary); }
  button.primary {
    background: var(--color-border-info);
    color: white;
    border-color: var(--color-border-info);
  }
  button.primary:hover { opacity: 0.9; }
  button:active { transform: scale(0.98); }
  button:disabled { opacity: 0.5; cursor: not-allowed; }
  
  .badge {
    padding: 2px 6px;
    font-size: 11px;
    font-weight: 600;
    border-radius: 4px;
    text-transform: uppercase;
  }
  .badge-ai { background: var(--color-background-info); color: var(--color-text-info); }
  .badge-db { background: var(--color-background-tertiary); color: var(--color-text-secondary); }
</style>
</head>
<body>

<div class="container">
  <div id="app"></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>

<script type="text/babel">
const { useState, useEffect, useMemo, useCallback } = React;

// Configured API key applied directly below
const GEMINI_API_KEY = "AQ.Ab8RN6KSvgFcaCR_9fv7e-RzEXazYTXiLwl2Nqtoc_mKJjSp6Q"; 

const TARGETS_KEY = 'pm_targets';
const dateKey = (d) => `pm_entries:${d}`;
const todayStr = () => {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
};

// Unified Food Database containing ALL initial entries, extensive Indian cuisine, snacks, and junk items
const FOOD_DB = [
  // --- Original Initial Database Staples ---
  { name: 'Chicken breast, cooked', unit: '100g', cal: 165, carbs: 0, protein: 31, fat: 3.6 },
  { name: 'White rice, cooked', unit: '100g', cal: 130, carbs: 28, protein: 2.7, fat: 0.3 },
  { name: 'Brown rice, cooked', unit: '100g', cal: 123, carbs: 26, protein: 2.7, fat: 1 },
  { name: 'Egg, whole', unit: '1 large', cal: 78, carbs: 0.6, protein: 6.3, fat: 5.3 },

  { name: 'Broccoli, cooked', unit: '100g', cal: 35, carbs: 7, protein: 2.4, fat: 0.4 },

  { name: 'Avocado', unit: '1/2 medium', cal: 120, carbs: 6, protein: 1.5, fat: 11 },
  { name: 'Oats, dry', unit: '40g', cal: 150, carbs: 27, protein: 5, fat: 2.5 },
  { name: 'Olive oil', unit: '1 tbsp', cal: 119, carbs: 0, protein: 0, fat: 13.5 },
  { name: 'Pasta, cooked', unit: '100g', cal: 131, carbs: 25, protein: 5, fat: 1.1 },
  { name: 'Paneer', unit: '100g', cal: 265, carbs: 3.6, protein: 18, fat: 20 },
  { name: 'Dal (lentils, cooked)', unit: '100g', cal: 116, carbs: 20, protein: 9, fat: 0.4 },
  { name: 'Chapati', unit: '1 piece', cal: 104, carbs: 18, protein: 3, fat: 2.5 },
  { name: 'Idli', unit: '1 piece', cal: 58, carbs: 12, protein: 2, fat: 0.3 },
  { name: 'Dosa, plain', unit: '1 piece', cal: 133, carbs: 22, protein: 3, fat: 3.5 },
  { name: 'Curd/yogurt', unit: '100g', cal: 60, carbs: 4.7, protein: 3.5, fat: 3.3 },

  // --- Expanded Indian Breads & Breakfasts ---
  { name: 'Butter Naan', unit: '1 piece', cal: 310, carbs: 48, protein: 9, fat: 9.5 },
  { name: 'Parotta (Malabar)', unit: '1 piece', cal: 290, carbs: 44, protein: 6, fat: 10 },
  { name: 'Aloo Paratha (with Butter)', unit: '1 piece', cal: 320, carbs: 45, protein: 6.5, fat: 13 },
  { name: 'Masala Dosa with Chutney/Sambar', unit: '1 plate', cal: 360, carbs: 54, protein: 7, fat: 12 },
  { name: 'Poha', unit: '1 plate (150g)', cal: 270, carbs: 46, protein: 5, fat: 7 },
  { name: 'Upma', unit: '1 bowl (150g)', cal: 210, carbs: 36, protein: 4, fat: 5.5 },
  { name: 'Puri Bhaji', unit: '2 puri + bhaji', cal: 385, carbs: 52, protein: 6.5, fat: 17 },

  // --- Indian Entrees, Curries & Rice Dishes ---
  { name: 'Paneer Butter Masala', unit: '1 serving (200g)', cal: 380, carbs: 12, protein: 14, fat: 31 },
  { name: 'Chicken Tikka Masala', unit: '1 serving (250g)', cal: 420, carbs: 14, protein: 32, fat: 26 },
  { name: 'Butter Chicken', unit: '1 serving (250g)', cal: 490, carbs: 16, protein: 30, fat: 33 },
  { name: 'Chole Masala', unit: '1 bowl (200g)', cal: 260, carbs: 38, protein: 10, fat: 8 },
  { name: 'Palak Paneer', unit: '1 bowl (200g)', cal: 240, carbs: 9, protein: 12, fat: 18 },
  { name: 'Chicken Biryani', unit: '1 plate (300g)', cal: 540, carbs: 62, protein: 28, fat: 19 },
  { name: 'Veg Biryani', unit: '1 plate (300g)', cal: 410, carbs: 68, protein: 9, fat: 11 },

  // --- Indian Street Food & Savory Snacks ---
  { name: 'Samosa', unit: '1 piece', cal: 260, carbs: 32, protein: 5, fat: 12 },
  { name: 'Pani Puri / Golgappa', unit: '6 pieces', cal: 180, carbs: 28, protein: 3, fat: 6 },
  { name: 'Vada Pav', unit: '1 piece', cal: 300, carbs: 41, protein: 7, fat: 12 },
  { name: 'Pav Bhaji', unit: '2 pav + bhaji', cal: 450, carbs: 64, protein: 9, fat: 16 },
  { name: 'Dhokla', unit: '2 pieces', cal: 90, carbs: 14, protein: 4, fat: 2 },
  { name: 'Bhel Puri', unit: '1 plate', cal: 210, carbs: 38, protein: 4, fat: 5 },
  { name: 'Onion Pakora', unit: '4 pieces', cal: 190, carbs: 22, protein: 3.5, fat: 10 },

  // --- Junk Snacks, Fast Food & Sweets ---
  { name: 'Potato Chips (Lays/Kurkure)', unit: '1 packet (50g)', cal: 270, carbs: 26, protein: 3, fat: 17 },
  { name: 'Maggi Noodles', unit: '1 packet cooked', cal: 345, carbs: 54, protein: 8, fat: 11 },
  { name: 'French Fries', unit: '1 medium order', cal: 365, carbs: 48, protein: 4, fat: 17 },
  { name: 'Burger (Fast food style)', unit: '1 piece', cal: 420, carbs: 44, protein: 18, fat: 19 },
  { name: 'Pizza (Pepperoni/Cheese)', unit: '1 medium slice', cal: 285, carbs: 30, protein: 12, fat: 11 },
  { name: 'Milk Chocolate Bar', unit: '40g', cal: 215, carbs: 24, protein: 3, fat: 12 },
  { name: 'Gulab Jamun', unit: '2 pieces', cal: 300, carbs: 50, protein: 4, fat: 10 },
  { name: 'Jalebi', unit: '2 pieces', cal: 220, carbs: 44, protein: 1.5, fat: 4.5 },
];

function round1(n) { return Math.round(n * 10) / 10; }

function Ring({ value, max, size = 110, stroke = 10, colorVar = 'var(--color-border-info)' }) {
  const r = (size - stroke) / 2;
  const c = 2 * Math.PI * r;
  const pct = Math.max(0, Math.min(1, max > 0 ? value / max : 0));
  return (
    <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`}>
      <circle cx={size/2} cy={size/2} r={r} fill="none" stroke="var(--color-border-tertiary)" strokeWidth={stroke} />
      <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={colorVar} strokeWidth={stroke}
        strokeDasharray={`${c}`} strokeDashoffset={`${c * (1 - pct)}`}
        strokeLinecap="round" transform={`rotate(-90 ${size/2} ${size/2})`} />
    </svg>
  );
}

function MacroBar({ label, value, target, barColor }) {
  const pct = target > 0 ? Math.min(100, Math.round((value / target) * 100)) : 0;
  return (
    <div style={{ marginBottom: 14 }}>
      <div style={{ display: 'flex', justifyContent: 'space-between', fontSize: 13, marginBottom: 5 }}>
        <span style={{ color: 'var(--color-text-secondary)', fontWeight: 500 }}>{label}</span>
        <span style={{ fontWeight: 600 }}>{round1(value)}g <span style={{color:'var(--color-text-tertiary)', fontWeight: 400}}>{target ? `/ ${target}g` : ''}</span></span>
      </div>
      <div style={{ height: 8, borderRadius: 6, background: 'var(--color-background-tertiary)', overflow: 'hidden' }}>
        <div style={{ width: `${pct}%`, height: '100%', background: barColor, borderRadius: 6 }} />
      </div>
    </div>
  );
}

function App() {
  const [theme, setTheme] = useState(() => localStorage.getItem('pm_theme') || 'light');
  const [date, setDate] = useState(todayStr());
  const [entries, setEntries] = useState([]);
  const [loading, setLoading] = useState(true);

  const [mode, setMode] = useState('ai');
  const [aiText, setAiText] = useState('');
  const [aiBusy, setAiBusy] = useState(false);
  const [aiPreview, setAiPreview] = useState(null);
  const [aiError, setAiError] = useState(null);

  const [searchTerm, setSearchTerm] = useState('');
  const [qty, setQty] = useState(1);
  const [selectedFood, setSelectedFood] = useState(null);

  const [targets, setTargets] = useState({ calories: 2000, carbs: 240, protein: 120, fat: 60 });
  const [showTargets, setShowTargets] = useState(false);

  useEffect(() => {
    document.documentElement.setAttribute('data-theme', theme);
    localStorage.setItem('pm_theme', theme);
  }, [theme]);

  useEffect(() => {
    const saved = localStorage.getItem(TARGETS_KEY);
    if (saved) setTargets(JSON.parse(saved));
  }, []);

  useEffect(() => {
    setLoading(true);
    const saved = localStorage.getItem(dateKey(date));
    setEntries(saved ? JSON.parse(saved) : []);
    setLoading(false);
  }, [date]);

  const saveEntries = useCallback((next) => {
    setEntries(next);
    localStorage.setItem(dateKey(date), JSON.stringify(next));
  }, [date]);

  const saveTargets = useCallback((next) => {
    setTargets(next);
    localStorage.setItem(TARGETS_KEY, JSON.stringify(next));
  }, []);

  const totals = useMemo(() => {
    return entries.reduce((acc, e) => ({
      cal: acc.cal + (e.cal || 0),
      carbs: acc.carbs + (e.carbs || 0),
      protein: acc.protein + (e.protein || 0),
      fat: acc.fat + (e.fat || 0),
    }), { cal: 0, carbs: 0, protein: 0, fat: 0 });
  }, [entries]);

  const addEntry = (entry) => {
    saveEntries([...entries, { ...entry, id: Date.now() + Math.random() }]);
  };

  const removeEntry = (id) => {
    saveEntries(entries.filter(e => e.id !== id));
  };

  const runAiEstimate = async () => {
    if (!aiText.trim()) return;
    setAiBusy(true);
    setAiError(null);
    setAiPreview(null);
    try {
      const prompt = `You are an expert nutrition estimator. Estimate macro tracking details for this user logged input, carefully matching standard Indian or global items. Entry text: "${aiText.trim()}"`;

      const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${GEMINI_API_KEY}`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          contents: [{ parts: [{ text: prompt }] }],
          generationConfig: {
            responseMimeType: "application/json",
            responseSchema: {
              type: "OBJECT",
              properties: {
                items: {
                  type: "ARRAY",
                  items: {
                    type: "OBJECT",
                    properties: {
                      name: { type: "STRING" },
                      cal: { type: "NUMBER" },
                      carbs: { type: "NUMBER" },
                      protein: { type: "NUMBER" },
                      fat: { type: "NUMBER" }
                    },
                    required: ["name", "cal", "carbs", "protein", "fat"]
                  }
                },
                total: {
                  type: "OBJECT",
                  properties: {
                    cal: { type: "NUMBER" },
                    carbs: { type: "NUMBER" },
                    protein: { type: "NUMBER" },
                    fat: { type: "NUMBER" }
                  },
                  required: ["cal", "carbs", "protein", "fat"]
                }
              },
              required: ["items", "total"]
            }
          }
        }),
      });

      if (!response.ok) throw new Error('API processing failure');
      const data = await response.json();
      const textBlock = data.candidates[0].content.parts[0].text;
      const parsed = JSON.parse(textBlock.trim());
      
      setAiPreview({ desc: aiText.trim(), ...parsed });
    } catch (e) {
      setAiError('Unable to process request. Check your API key setup or type directly inside the Verified Catalog search tab.');
    } finally {
      setAiBusy(false);
    }
  };

  const confirmAiPreview = () => {
    if (!aiPreview) return;
    addEntry({
      label: aiPreview.desc,
      cal: aiPreview.total.cal,
      carbs: aiPreview.total.carbs,
      protein: aiPreview.total.protein,
      fat: aiPreview.total.fat,
      source: 'ai',
    });
    setAiPreview(null);
    setAiText('');
  };

  const filteredFoods = useMemo(() => {
    if (!searchTerm.trim()) return FOOD_DB.slice(0, 5);
    const t = searchTerm.toLowerCase();
    return FOOD_DB.filter(f => f.name.toLowerCase().includes(t)).slice(0, 8);
  }, [searchTerm]);

  const addSearchFood = () => {
    if (!selectedFood) return;
    addEntry({
      label: `${selectedFood.name} (${qty}x)`,
      cal: selectedFood.cal * qty,
      carbs: selectedFood.carbs * qty,
      protein: selectedFood.protein * qty,
      fat: selectedFood.fat * qty,
      source: 'db',
    });
    setSelectedFood(null);
    setSearchTerm('');
    setQty(1);
  };

  const shiftDate = (delta) => {
    const d = new Date(date + 'T00:00:00');
    d.setDate(d.getDate() + delta);
    setDate(`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`);
  };

  return (
    <div>
      <header>
        <h1>Pro Metrics</h1>
        <button onClick={() => setTheme(t => t === 'light' ? 'dark' : 'light')} style={{ padding: '8px 12px' }} aria-label="Toggle Theme">
          <i className={theme === 'light' ? "ti ti-moon" : "ti ti-sun"} style={{fontSize:18}}></i>
        </button>
      </header>

      {/* Date Navigation Panel */}
      <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: '1.5rem', gap: 10 }}>
        <button onClick={() => shiftDate(-1)} aria-label="Previous day"><i className="ti ti-chevron-left"></i></button>
        <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
          <input type="date" value={date} onChange={e => setDate(e.target.value)} style={{ fontWeight: 500, textAlign: 'center' }} />
          {date !== todayStr() && <button onClick={() => setDate(todayStr())}>Today</button>}
        </div>
        <button onClick={() => shiftDate(1)} aria-label="Next day"><i className="ti ti-chevron-right"></i></button>
      </div>

      {/* Core Summary Cards */}
      <div className="card" style={{ display: 'flex', flexDirection: 'column', gap: '1rem' }}>
        <div style={{ display: 'flex', gap: '2rem', alignItems: 'center', flexWrap: 'wrap' }}>
          <div style={{ position: 'relative', flexShrink: 0, margin: '0 auto' }}>
            <Ring value={totals.cal} max={targets.calories} />
            <div style={{ position: 'absolute', inset: 0, display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center' }}>
              <span style={{ fontSize: 22, fontWeight: 700, letterSpacing: '-0.5px' }}>{Math.round(totals.cal)}</span>
              <span style={{ fontSize: 11, color: 'var(--color-text-secondary)' }}>/ {targets.calories} kcal</span>
            </div>
          </div>
          <div style={{ flex: '1 1 280px' }}>
            <MacroBar label="Carbohydrates" value={totals.carbs} target={targets.carbs} barColor="var(--color-macro-carbs)" />
            <MacroBar label="Protein" value={totals.protein} target={targets.protein} barColor="var(--color-macro-protein)" />
            <MacroBar label="Fats" value={totals.fat} target={targets.fat} barColor="var(--color-macro-fat)" />
          </div>
        </div>
        
        <div style={{ borderTop: '1px solid var(--color-border-tertiary)', paddingTop: '10px' }}>
          <button onClick={() => setShowTargets(s => !s)} style={{ fontSize: 13 }}>
            <i className="ti ti-adjustments-horizontal"></i> {showTargets ? 'Minimize Targets' : 'Configure Custom Target Split'}
          </button>
        </div>

        {showTargets && (
          <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(120px, 1fr))', gap: 12, marginTop: 4 }}>
            {['calories','carbs','protein','fat'].map(k => (
              <div key={k}>
                <label style={{ fontSize: 12, color: 'var(--color-text-secondary)', display: 'block', marginBottom: 4, textTransform: 'capitalize' }}>
                  {k === 'calories' ? 'Calories (kcal)' : `${k} (g)`}
                </label>
                <input type="number" value={targets[k]} min="0"
                  onChange={e => saveTargets({ ...targets, [k]: Number(e.target.value) || 0 })}
                  style={{ width: '100%' }} />
              </div>
            ))}
          </div>
        )}
      </div>

      {/* Input Tab Navigation Selector */}
      <div style={{ marginBottom: '1.5rem' }}>
        <div style={{ display: 'flex', gap: 10, marginBottom: 12 }}>
          <button className={mode === 'ai' ? 'primary' : ''} onClick={() => setMode('ai')} style={{flex: 1}}>
            <i className="ti ti-sparkles"></i> AI Context Logger
          </button>
          <button className={mode === 'search' ? 'primary' : ''} onClick={() => setMode('search')} style={{flex: 1}}>
            <i className="ti ti-database"></i> Search Verified Catalog
          </button>
        </div>

        {/* AI Processing Form Section */}
        {mode === 'ai' && (
          <div className="card" style={{marginTop: 0}}>
            <div style={{ display: 'flex', gap: 8 }}>
              <input
                type="text"
                placeholder="e.g. 2 whole chapatis, 1 bowl paneer butter masala and a packet of lays"
                value={aiText}
                onChange={e => setAiText(e.target.value)}
                onKeyDown={e => { if (e.key === 'Enter') runAiEstimate(); }}
                style={{ flex: 1 }}
              />
              <button className="primary" onClick={runAiEstimate} disabled={aiBusy || !aiText.trim()}>
                {aiBusy ? <i className="ti ti-loader-2 ti-spin"></i> : 'Parse'}
              </button>
            </div>
            {aiError && <p style={{ fontSize: 13, color: 'var(--color-text-danger)', marginTop: 10 }}>{aiError}</p>}

            {aiPreview && (
              <div style={{ marginTop: 14, background: 'var(--color-background-secondary)', borderRadius: 'var(--border-radius-md)', padding: '14px' }}>
                <h4 style={{margin: '0 0 10px 0', fontSize: '14px', fontWeight: 600}}>AI Evaluation Assessment</h4>
                {aiPreview.items && aiPreview.items.length > 0 && (
                  <div style={{ marginBottom: 12, display: 'flex', flexDirection: 'column', gap: 6 }}>
                    {aiPreview.items.map((it, i) => (
                      <div key={i} style={{ display: 'flex', justifyContent: 'space-between', fontSize: 13, color: 'var(--color-text-secondary)' }}>
                        <span>• {it.name}</span>
                        <span style={{fontWeight: 500}}>{Math.round(it.cal)} kcal</span>
                      </div>
                    ))}
                  </div>
                )}
                <div style={{ display: 'flex', justifyContent: 'space-between', fontWeight: 600, borderTop: '1px solid var(--color-border-tertiary)', paddingTop: 8, marginBottom: 6 }}>
                  <span>Total Calculated Estimate</span>
                  <span>{Math.round(aiPreview.total.cal)} kcal</span>
                </div>
                <div style={{ display: 'flex', gap: 14, fontSize: 12, color: 'var(--color-text-secondary)', marginBottom: 14 }}>
                  <span>Carbs: <b>{round1(aiPreview.total.carbs)}g</b></span>
                  <span>Protein: <b>{round1(aiPreview.total.protein)}g</b></span>
                  <span>Fat: <b>{round1(aiPreview.total.fat)}g</b></span>
                </div>
                <div style={{ display: 'flex', gap: 8 }}>
                  <button className="primary" onClick={confirmAiPreview} style={{padding: '6px 12px', fontSize: 13}}><i className="ti ti-check"></i> Add Log</button>
                  <button onClick={() => setAiPreview(null)} style={{padding: '6px 12px', fontSize: 13}}>Discard</button>
                </div>
              </div>
            )}
          </div>
        )}

        {/* Catalog List Database Filter Segment */}
        {mode === 'search' && (
          <div className="card" style={{marginTop: 0}}>
            <input
              type="text"
              placeholder="Search Indian entries, meals, snacks, or standard fitness food items..."
              value={searchTerm}
              onChange={e => { setSearchTerm(e.target.value); setSelectedFood(null); }}
              style={{ width: '100%', marginBottom: 10 }}
            />
            {!selectedFood && (
              <div style={{maxHeight: '260px', overflowY: 'auto'}}>
                {filteredFoods.map((f, i) => (
                  <div key={i} onClick={() => { setSelectedFood(f); setQty(1); }}
                    style={{ display: 'flex', justifyContent: 'space-between', padding: '10px 12px', borderRadius: 'var(--border-radius-sm)', cursor: 'pointer', fontSize: 14 }}
                    onMouseEnter={e => e.currentTarget.style.background = 'var(--color-background-secondary)'}
                    onMouseLeave={e => e.currentTarget.style.background = 'transparent'}>
                    <span style={{fontWeight: 500}}>{f.name}</span>
                    <span style={{ color: 'var(--color-text-secondary)', fontSize: 13 }}>{f.cal} kcal / {f.unit}</span>
                  </div>
                ))}
                {filteredFoods.length === 0 && <p style={{ fontSize: 13, color: 'var(--color-text-secondary)', padding: '10px 0' }}>No exact matches located. Try describing it to the AI tracker panel.</p>}
              </div>
            )}
            
            {selectedFood && (
              <div style={{ background: 'var(--color-background-secondary)', borderRadius: 'var(--border-radius-md)', padding: '14px', marginTop: 4 }}>
                <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 12 }}>
                  <span style={{ fontWeight: 600, fontSize: 15 }}>{selectedFood.name}</span>
                  <button onClick={() => setSelectedFood(null)} aria-label="Clear configuration" style={{ padding: '4px 8px' }}><i className="ti ti-x"></i></button>
                </div>
                <div style={{ display: 'flex', alignItems: 'center', gap: 12, marginBottom: 12 }}>
                  <label style={{ fontSize: 13, color: 'var(--color-text-secondary)', fontWeight: 500 }}>Multiplier ({selectedFood.unit})</label>
                  <input type="number" min="0.25" step="0.25" value={qty} onChange={e => setQty(Number(e.target.value) || 0)} style={{ width: 80 }} />
                </div>
                <div style={{ fontSize: 13, color: 'var(--color-text-secondary)', marginBottom: 14, background: 'var(--color-background-primary)', padding: '8px 12px', borderRadius: '6px', border: '1px solid var(--color-border-tertiary)' }}>
                  Total: <b style={{color: 'var(--color-text-primary)'}}>{Math.round(selectedFood.cal * qty)} kcal</b> · C: {round1(selectedFood.carbs * qty)}g · P: {round1(selectedFood.protein * qty)}g · F: {round1(selectedFood.fat * qty)}g
                </div>
                <button className="primary" onClick={addSearchFood}><i className="ti ti-plus"></i> Add item entry</button>
              </div>
            )}
          </div>
        )}
      </div>

      {/* Persistent Daily Log Panel Grid */}
      <div className="card">
        <h3 style={{fontSize: 16, fontWeight: 600, margin: '0 0 1rem 0', display: 'flex', justifyContent: 'space-between'}}>
          <span>Daily Performance Record</span>
          <span style={{fontSize: 13, color: 'var(--color-text-secondary)', fontWeight: 400}}>
            {loading ? 'Syncing...' : `${entries.length} logged`}
          </span>
        </h3>
        
        <div style={{display: 'flex', flexDirection: 'column'}}>
          {entries.length === 0 ? (
            <p style={{ fontSize: 13, color: 'var(--color-text-tertiary)', margin: 0, textAlign: 'center', padding: '20px 0' }}>No nutritional metrics recorded for this cycle timestamp window.</p>
          ) : (
            entries.map(e => (
              <div key={e.id} style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', padding: '12px 0', borderBottom: '1px solid var(--color-border-tertiary)' }}>
                <div style={{ minWidth: 0, paddingRight: 10 }}>
                  <p style={{ fontSize: 14, margin: '0 0 4px 0', fontWeight: 500, display: 'flex', alignItems: 'center', gap: 6 }}>
                    {e.label}
                    <span className={`badge badge-${e.source || 'db'}`}>{e.source || 'db'}</span>
                  </p>
                  <p style={{ fontSize: 12, color: 'var(--color-text-secondary)', margin: 0 }}>
                    <b>{Math.round(e.cal)} kcal</b> · Carbs {round1(e.carbs)}g · Protein {round1(e.protein)}g · Fat {round1(e.fat)}g
                  </p>
                </div>
                <button onClick={() => removeEntry(e.id)} aria-label="Delete metric record" style={{ padding: '6px 10px', color: 'var(--color-text-danger)' }}>
                  <i className="ti ti-trash"></i>
                </button>
              </div>
            ))
          )}
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('app')).render(<App />);
</script>
</body>
</html>
